<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIT Daily — Healthcare IT Intelligence Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #080d1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0d1528 0%, #111e38 100%);
      border-bottom: 1px solid #1a3050;
      padding: 18px 0;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 4px 24px rgba(0,0,0,.45);
    }
    .hdr {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #1560a8, #2d9cdb);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 16px rgba(45,156,219,.35);
    }
    .logo-text h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .logo-text p  { font-size: 11px; color: #4a6080; margin-top: 2px; letter-spacing: .5px; text-transform: uppercase; }
    .hdr-right { display: flex; align-items: center; gap: 14px; }
    .ts { font-size: 12px; color: #3a5070; }

    .btn-refresh {
      background: linear-gradient(135deg, #1560a8, #2d9cdb);
      color: #fff; border: none;
      padding: 9px 18px; border-radius: 7px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 0 14px rgba(45,156,219,.3);
    }
    .btn-refresh:hover  { opacity: .88; transform: translateY(-1px); }
    .btn-refresh:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Layout ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid #1a3050;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #4a6080;
      padding: 12px 26px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: -1px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color .2s, border-color .2s;
      letter-spacing: .1px;
    }
    .tab-btn:hover { color: #7a9ab8; }
    .tab-btn.active { color: #2d9cdb; border-bottom-color: #2d9cdb; }
    .tab-btn.active.clin { color: #10b981; border-bottom-color: #10b981; }
    .tab-btn.active.rwe  { color: #a78bfa; border-bottom-color: #a78bfa; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Stats bar ── */
    .stats { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat {
      background: #0f1828;
      border: 1px solid #1a3050;
      border-radius: 10px;
      padding: 12px 22px;
      display: flex; align-items: center; gap: 12px;
    }
    .stat-val { font-size: 26px; font-weight: 800; color: #2d9cdb; line-height: 1; }
    .stat-val.green  { color: #10b981; }
    .stat-val.purple { color: #a78bfa; }
    .stat-lbl { font-size: 11px; color: #3a5070; text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }

    /* ── Filter chips ── */
    .filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 22px; }
    .chip {
      background: transparent;
      border: 1px solid #1a3050;
      color: #3a5070;
      padding: 5px 14px; border-radius: 20px;
      cursor: pointer; font-size: 12px; font-weight: 500;
      transition: all .2s;
    }
    .chip:hover, .chip.on {
      background: rgba(21,96,168,.2);
      border-color: #2d9cdb;
      color: #2d9cdb;
    }
    .chip.green-chip:hover, .chip.green-chip.on {
      background: rgba(16,185,129,.12);
      border-color: #10b981;
      color: #10b981;
    }
    .chip.purple-chip:hover, .chip.purple-chip.on {
      background: rgba(167,139,250,.12);
      border-color: #a78bfa;
      color: #a78bfa;
    }

    /* ── Date window badge ── */
    .date-window {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16,185,129,.08);
      border: 1px solid rgba(16,185,129,.2);
      color: #059669;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 22px;
    }

    /* ── Loading ── */
    .loader {
      text-align: center;
      padding: 80px 20px;
    }
    .spinner {
      display: inline-block; width: 44px; height: 44px;
      border: 3px solid #1a3050; border-top-color: #2d9cdb;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    .spinner.green  { border-top-color: #10b981; }
    .spinner.purple { border-top-color: #a78bfa; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt { margin-top: 16px; color: #3a5070; font-size: 14px; }
    .prog-wrap { width: 220px; height: 3px; background: #1a3050; border-radius: 2px; margin: 14px auto 0; overflow: hidden; }
    .prog-bar  { height: 100%; background: linear-gradient(90deg,#1560a8,#2d9cdb); border-radius: 2px; transition: width .35s ease; }
    .prog-bar.green  { background: linear-gradient(90deg,#059669,#10b981); }
    .prog-bar.purple { background: linear-gradient(90deg,#7c3aed,#a78bfa); }

    /* ── News cards ── */
    .feed { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: #0f1828;
      border: 1px solid #1a3050;
      border-radius: 12px;
      padding: 22px 24px 20px 28px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, #1560a8, #2d9cdb);
      border-radius: 3px 0 0 3px;
    }
    .card.clin::before {
      background: linear-gradient(180deg, #059669, #10b981);
    }
    .card.rwe::before {
      background: linear-gradient(180deg, #7c3aed, #a78bfa);
    }
    .card:hover {
      border-color: #2d9cdb;
      transform: translateX(3px);
      box-shadow: 0 4px 24px rgba(45,156,219,.1);
    }
    .card.clin:hover {
      border-color: #10b981;
      box-shadow: 0 4px 24px rgba(16,185,129,.1);
    }
    .card.rwe:hover {
      border-color: #a78bfa;
      box-shadow: 0 4px 24px rgba(167,139,250,.1);
    }

    .card-meta {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 10px;
    }
    .badge-src {
      background: rgba(21,96,168,.2);
      color: #2d9cdb;
      border: 1px solid rgba(21,96,168,.35);
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .badge-vendor {
      background: rgba(16,185,129,.12);
      color: #10b981;
      border: 1px solid rgba(16,185,129,.28);
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
      letter-spacing: .3px;
    }
    .badge-rwe-vendor {
      background: rgba(167,139,250,.12);
      color: #a78bfa;
      border: 1px solid rgba(167,139,250,.28);
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
      letter-spacing: .3px;
    }
    .badge-date {
      color: #3a5070; font-size: 12px;
      display: flex; align-items: center; gap: 4px;
    }
    .badge-cat {
      background: rgba(255,255,255,.04);
      color: #3a5070;
      border: 1px solid #1a3050;
      padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .4px;
    }

    .card-title {
      font-size: 16px; font-weight: 700;
      color: #f0f4f8; line-height: 1.45; margin-bottom: 9px;
    }
    .card-title a { color: inherit; text-decoration: none; transition: color .2s; }
    .card-title a:hover { color: #2d9cdb; }
    .card.clin .card-title a:hover { color: #10b981; }
    .card.rwe  .card-title a:hover { color: #a78bfa; }

    .card-body {
      font-size: 14px; color: #7a9ab8; line-height: 1.65; margin-bottom: 14px;
    }

    .read-more {
      color: #2d9cdb; text-decoration: none;
      font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
      transition: gap .2s;
    }
    .read-more:hover { gap: 9px; }
    .card.clin .read-more { color: #10b981; }
    .card.rwe  .read-more { color: #a78bfa; }

    /* ── Error / empty ── */
    .error-box {
      background: rgba(220,38,38,.05);
      border: 1px solid rgba(220,38,38,.2);
      border-radius: 12px; padding: 32px 28px; text-align: center;
    }
    .error-box h3 { font-size: 18px; color: #ef4444; margin-bottom: 10px; }
    .error-box p  { font-size: 14px; color: #7a9ab8; line-height: 1.7; }
    .error-box code {
      background: rgba(255,255,255,.06); padding: 2px 7px;
      border-radius: 4px; font-size: 12px; color: #2d9cdb;
    }

    .empty {
      text-align: center; padding: 70px 20px;
      color: #3a5070;
    }
    .empty .icon { font-size: 44px; margin-bottom: 16px; }
    .empty h3 { font-size: 17px; color: #7a9ab8; margin-bottom: 8px; }
    .empty p  { font-size: 13px; }

    @media (max-width: 640px) {
      .hdr { flex-direction: column; text-align: center; }
      .card { padding: 16px 18px 14px 22px; }
      .card-title { font-size: 14px; }
      .card-body  { font-size: 13px; }
      .tab-btn { padding: 10px 16px; font-size: 13px; }
    }
  </style>
</head>

function isWithin30Days(article) {
  if (!article.publishedAt) return false;
  const pub = new Date(article.publishedAt);
  const cutoff = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
  return pub >= cutoff;
}

/* ─────────────────────────────────────────────
   Fetch one RSS feed via rss2json proxy
───────────────────────────────────────────── */
async function fetchFeed(feed) {
  try {
    const res  = await fetch(PROXY + encodeURIComponent(feed.url));
    const data = await res.json();
    if (data.status !== 'ok') {
      console.warn(`${feed.name}: ${data.message}`);
      return [];
    }
    return (data.items || []).map(item => ({
      title:       item.title?.trim(),
      url:         item.link,
      publishedAt: item.pubDate,
      description: (item.description || '').replace(/<[^>]+>/g, '').trim(),
      _sourceId:   feed.id,
      _sourceName: feed.name,
    }));
  } catch (e) {
    console.warn(`Failed to load ${feed.name}:`, e.message);
    return [];
  }
}

/* ─────────────────────────────────────────────
   Main loader — fetches all feeds, populates all tabs
───────────────────────────────────────────── */
async function loadAll() {
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.disabled = true;
  document.getElementById('ts').textContent = '—';

  // Reset all panels to loading state
  showMandALoader();
  showClinicalLoader();
  showRweLoader();

  // Fetch all three feed sets in parallel
  const [generalResults, clinOnlyResults, rweOnlyResults] = await Promise.all([
    Promise.all(FEEDS.map(fetchFeed)),
    Promise.all(CLINICAL_FEEDS.map(fetchFeed)),
    Promise.all(RWE_FEEDS.map(fetchFeed)),
  ]);

  // --- M&A tab: de-dup from general feeds only ---
  const seenMA = new Set();
  rawArticles = [];
  generalResults.forEach(items => {
    items.forEach(a => {
      if (!a.url || !a.title) return;
      if (seenMA.has(a.url)) return;
      seenMA.add(a.url);
      rawArticles.push(a);
    });
  });

  // --- Clinical tab: de-dup from general + clinical-specific feeds ---
  const seenClin = new Set();
  const clinRaw = [];
  [...generalResults, ...clinOnlyResults].forEach(items => {
    items.forEach(a => {
      if (!a.url || !a.title) return;
      if (seenClin.has(a.url)) return;
      seenClin.add(a.url);
      clinRaw.push(a);
    });
  });

  // --- RWE tab: de-dup from general + RWE-specific feeds ---
  const seenRwe = new Set();
  const rweRaw = [];
  [...generalResults, ...rweOnlyResults].forEach(items => {
    items.forEach(a => {
      if (!a.url || !a.title) return;
      if (seenRwe.has(a.url)) return;
      seenRwe.add(a.url);
      rweRaw.push(a);
    });
  });

  // Process M&A tab
  allArticles = rawArticles
    .filter(a => isMandA(a) && isHealthcare(a))
    .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

  // Process Clinical Decisions tab (last 30 days + vendor keywords)
  clinicalArticles = clinRaw
    .filter(a => isWithin30Days(a) && isClinicalDecisions(a))
    .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

  // Process Real World Evidence tab (last 30 days + RWE vendor keywords)
  rweArticles = rweRaw
    .filter(a => isWithin30Days(a) && isRweVendor(a))
    .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

  // Timestamp
  const now = new Date();
  document.getElementById('ts').textContent =
    'Last refreshed: ' +
    now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
    ' at ' +
    now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  refreshBtn.disabled = false;

  // Update progress bars and render all tabs
  const pb = document.getElementById('progBar');
  if (pb) pb.style.width = '100%';
  renderMandA();

  const cpb = document.getElementById('clinProgBar');
  if (cpb) cpb.style.width = '100%';
  renderClinical();

  const rpb = document.getElementById('rweProgBar');
  if (rpb) rpb.style.width = '100%';
  renderRwe();
}

    feedEl.innerHTML = `
      <div class="empty">
        <div class="icon">🔍</div>
        <h3>No articles for this vendor in the last 30 days</h3>
        <p>Try a different vendor filter or click Refresh.</p>
      </div>`;
    return;
  }

  feedEl.innerHTML = `<div class="feed">${filtered.map(rweCard).join('')}</div>`;
}

/* ─────────────────────────────────────────────
   Helpers
───────────────────────────────────────────── */
function snippet(text) {
  if (!text) return '';
  const raw = text.replace(/<[^>]+>/g, '').trim();
  if (raw.length <= 320) return raw;
  const cut = raw.slice(0, 320);
  const dot = cut.lastIndexOf('.');
  return dot > 200 ? cut.slice(0, dot + 1) : cut + '…';
}

function relDate(iso) {
  if (!iso) return '';
  const d    = new Date(iso);
  const diff = Date.now() - d.getTime();
  const h    = Math.floor(diff / 3_600_000);
  const days = Math.floor(diff / 86_400_000);
  if (h < 1)    return 'Just now';
  if (h < 24)   return `${h}h ago`;
  if (days < 2) return 'Yesterday';
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString('en-US', {
    month: 'short', day: 'numeric',
    ...(d.getFullYear() !== new Date().getFullYear() && { year: 'numeric' }),
  });
}

function esc(s) {
  if (!s) return '';
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ─────────────────────────────────────────────
   Tab switching
───────────────────────────────────────────── */
document.querySelector('.tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  if (tab === activeTab) return;
  activeTab = tab;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
});
